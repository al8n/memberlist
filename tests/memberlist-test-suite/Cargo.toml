[package]
name = "memberlist-test-suite"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
publish = false

# A driver-agnostic real-node test suite: the `TestCluster` trait plus the
# scenario library, written once and run by every driver's tests over its own
# adapter. Holds no driver dependency — each driver dev-depends on this crate
# and supplies the adapter + the per-transport instantiations.

[dependencies]
bytes.workspace = true
smol_str.workspace = true
# For the transform-matrix knobs on `NodeConfig` (the algorithm enums + the
# secret-key type). proto is the driver-agnostic type layer both drivers share.
# The transform algorithm enums and `SecretKey` variants are each gated behind
# their backend feature, so this harness — which exposes the whole transform
# matrix to the driver suites — enables every backend. The workspace dep is
# `default-features = false`, so `std` is enabled explicitly too.
memberlist-proto = { workspace = true, features = [
  "std",
  "lz4",
  "snappy",
  "zstd",
  "brotli",
  "aes-gcm",
  "chacha20-poly1305",
  "crc32",
  "xxhash32",
  "xxhash64",
  "xxhash3",
  "murmur3",
] }
