name: ci-tokio

# The reactor async driver under tokio: the driver-agnostic test suite's tokio
# cells (and the transform matrix) plus the reactor's own tokio integration
# tests. The reactor suite binaries also carry smol cells; those are skipped
# here and covered by ci-smol. Nodes bind ephemeral loopback ports, so no subnet
# setup is required.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "COPYRIGHT"
      - "LICENSE*"
      - "**.md"
      - "**.txt"
      - "art"
  pull_request:
    paths-ignore:
      - "README.md"
      - "COPYRIGHT"
      - "LICENSE*"
      - "**.md"
      - "**.txt"
      - "art"
  workflow_dispatch:
  schedule: [cron: "0 1 */30 * *"]

env:
  FEATURES: "tcp,tls-rustls-ring,quic-rustls-ring,compression-lz4,checksum-crc32,encryption-aes-gcm,cidr"

jobs:
  test:
    name: ${{ matrix.os }} - reactor - tokio
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: clippy, rustfmt

      # Cache BEFORE the build steps so the restore actually warms this run; a
      # cache placed after the test step only saves, never restores.
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-reactor-tokio

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Format
        run: cargo fmt -p memberlist-reactor -p memberlist-test-suite --check

      - name: Clippy
        # --no-deps: lint only our own crate, not its external dependencies.
        run: cargo clippy -p memberlist-reactor --all-targets --features "$FEATURES" --no-deps -- -D warnings

      - name: Test (tokio cells; smol cells skipped — see ci-smol)
        run: cargo test -p memberlist-reactor --features "$FEATURES" -- --skip _smol

      # The umbrella facade crate otherwise has no CI; exercise its smoke test.
      - name: Test umbrella (memberlist)
        run: cargo test -p memberlist --features tokio,tcp,quic-rustls-ring
