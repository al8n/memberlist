name: loc

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "COPYRIGHT"
      - "LICENSE*"
      - "**.md"
      - "**.txt"
      - "art"
  pull_request:
    paths-ignore:
      - "README.md"
      - "COPYRIGHT"
      - "LICENSE*"
      - "**.md"
      - "**.txt"
      - "art"
  workflow_dispatch:

jobs:
  loc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: clippy, rustfmt

      - name: Install tokeit
        run: |
          cargo install tokeit --force

      - name: Count lines of code (workspace total + each crate)
        run: |
          set -euo pipefail
          tokeit
          mv tokeit.json loc-memberlist.json
          for c in memberlist-proto memberlist-compio memberlist-reactor memberlist-smoltcp memberlist-embassy memberlist-embedded; do
            ( cd "$c" && tokeit )
            mv "$c/tokeit.json" "loc-$c.json"
          done

      - name: Upload all loc to the gist in one request
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GIST_PAT }}
          script: |
            const fs = require('fs');
            const gistId = 'd29ceff54c025fe4e8b144a51efb9324';
            // Gist file `memberlist` is the workspace total; the rest are
            // per-crate. These names match the LoC badge URLs in the crate
            // READMEs (…/raw/<name>). The gists API accepts every file in one
            // PATCH, so one request avoids the per-crate rate-limit storm.
            const crates = [
              'memberlist-proto',
              'memberlist-compio',
              'memberlist-reactor',
              'memberlist-smoltcp',
              'memberlist-embassy',
              'memberlist-embedded',
            ];
            const files = {
              memberlist: { content: fs.readFileSync('loc-memberlist.json', 'utf8') },
            };
            for (const c of crates) {
              files[c] = { content: fs.readFileSync(`loc-${c}.json`, 'utf8') };
            }
            await github.rest.gists.update({ gist_id: gistId, files });
            console.log('Gist updated');
