name: coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "COPYRIGHT"
      - "LICENSE*"
      - "**.md"
      - "**.txt"
      - "art"
  pull_request:
    paths-ignore:
      - "README.md"
      - "COPYRIGHT"
      - "LICENSE*"
      - "**.md"
      - "**.txt"
      - "art"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Collect coverage
        run: |
          # Accumulate per-crate runs into a shared profile, then emit one lcov
          # report. Each crate runs a representative feature combo that maximizes
          # covered code (every transport plus a transform backend per kind and
          # `cidr` where the feature exists). A per-crate `--all-features` sweep is
          # not usable here: the `fips` feature needs a Go toolchain and several
          # crypto-backend features are mutually exclusive.
          #
          # The harness crates (memberlist-simulation / -test-suite /
          # -embassy-qemu) are excluded from the codecov report (.codecov.yml), and
          # the library lines they exercise are already covered by the driver
          # crates' own integration suites, so they are not run here — sparing the
          # job the simulation suite's multi-minute llvm-cov pass.
          cargo llvm-cov --no-report -p memberlist-proto \
            --features "std,cidr,tcp,tls-rustls-ring,quic-rustls-ring,lz4,snappy,zstd,brotli,crc32,xxhash32,xxhash64,xxhash3,murmur3,aes-gcm,chacha20-poly1305"
          cargo llvm-cov --no-report -p memberlist-reactor \
            --features "tcp,tls-rustls-ring,quic-rustls-ring,lz4,crc32,aes-gcm,cidr,tokio"
          cargo llvm-cov --no-report -p memberlist-compio \
            --features "tcp,tls-rustls-ring,quic-rustls-ring,lz4,crc32,aes-gcm,chacha20-poly1305,cidr"
          cargo llvm-cov --no-report -p memberlist-embedded \
            --features "std,cidr,lz4,snappy,zstd,brotli,crc32,xxhash32,xxhash64,xxhash3,murmur3,aes-gcm,chacha20-poly1305"
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          slug: ${{ github.repository }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
