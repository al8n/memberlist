name: msrv

# Validate the std crates build on the stable channel and on the declared MSRV
# (rust-version = 1.96.0 — floored by the dependency tree: compio-buf adopts the
# just-stabilized maybe_uninit_slice, so the workspace does not build below this).
# Every other workflow pins a specific nightly, so without this nothing proves the
# crate compiles on stable or at its stated minimum. The embedded line (no_std,
# bare-metal targets) is covered by embedded.yml and excluded here.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "art"
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.txt"
      - "art"
  workflow_dispatch:

jobs:
  check:
    name: ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - "1.96.0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Check std crates
        run: >
          cargo check
          -p memberlist-proto
          -p memberlist-reactor
          -p memberlist-compio
          -p memberlist
          --features memberlist/tokio,memberlist/tcp,memberlist/quic-rustls-ring,memberlist-reactor/tokio,memberlist-reactor/tcp,memberlist-compio/tcp
