codecov:
  require_ci_to_pass: false

ignore:
  - examples/
  - fuzz/
  - "**/tests/**"
  - "**/tests.rs"

coverage:
  status:
    project: # Overall project status
      default:
        target: auto
        # Tolerate sub-0.1% run-to-run measurement jitter on unchanged files;
        # the strict patch status below still gates uncovered new code.
        threshold: 0.1%
        if_not_found: success
        only_pulls: false
    patch: # Status for the patch in pull requests
      default:
        target: auto
        if_not_found: success
        only_pulls: true
    changes: false # Whether to comment on the coverage changes in pull requests

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
